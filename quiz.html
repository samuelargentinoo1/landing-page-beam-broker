<style>
/* ============================================================
   BEAM BROKER — TOKENS DE MARCA
   ============================================================ */
:root{
  --bg:        #0a0a0a;
  --surface:   #101310;
  --surface-2: #141814;
  --line:      #222923;
  --line-2:    #313b33;
  --g1:        #4ef35f;   /* verde Beam (início do gradiente da logo)  */
  --g2:        #a0fd98;   /* verde Beam (fim do gradiente da logo)     */
  --grad:      linear-gradient(90deg,var(--g1),var(--g2));
  --text:      #f2f5f1;
  --muted:     #9aa59c;
  --dim:       #6c766e;
  --radius:    16px;
  --f-display: 'Space Grotesk', 'Inter', sans-serif;
  --f-body:    'Inter', system-ui, sans-serif;
}

*{margin:0;padding:0;box-sizing:border-box}
html{scroll-behavior:smooth}
body{
  background:var(--bg);
  color:var(--text);
  font-family:var(--f-body);
  min-height:100dvh;
  -webkit-font-smoothing:antialiased;
}
/* brilho ambiente discreto no topo, na cor da marca */
body::before{
  content:"";position:fixed;inset:0;pointer-events:none;z-index:0;
  background:
    radial-gradient(640px 360px at 50% -120px, rgba(78,243,95,.10), transparent 70%),
    radial-gradient(900px 620px at 88% 112%, rgba(78,243,95,.05), transparent 70%);
}

/* ---------- barra de progresso ---------- */
.progress{position:fixed;top:0;left:0;right:0;height:3px;background:rgba(255,255,255,.06);z-index:10}
.progress__fill{
  height:100%;width:0;min-width:26px;
  background:var(--grad);
  box-shadow:0 0 14px rgba(78,243,95,.55);
  transition:width .55s cubic-bezier(.25,.8,.3,1);
}

/* ---------- estrutura ---------- */
.stage{position:relative;z-index:1;min-height:100dvh;display:flex;flex-direction:column;align-items:center;padding:0 clamp(18px,4vw,40px) 56px}
.brand{padding:clamp(30px,6vh,58px) 0 clamp(18px,3.5vh,34px)}
.brand img{width:clamp(150px,24vw,208px);height:auto;display:block}
.content{flex:1;width:100%;display:flex;align-items:center;justify-content:center}
.screen{width:100%;max-width:640px;text-align:center}
.screen--final{max-width:800px}

/* ---------- badge + contador ---------- */
.pill{
  display:inline-flex;align-items:center;gap:8px;
  padding:7px 14px;border-radius:999px;
  border:1px solid rgba(78,243,95,.28);background:rgba(78,243,95,.06);
  font:600 11px/1 var(--f-body);letter-spacing:.16em;text-transform:uppercase;color:#d6e0d6;
}
.pill .dot{width:6px;height:6px;border-radius:50%;background:var(--grad);animation:ping 1.8s ease-out infinite}
@keyframes ping{0%{box-shadow:0 0 0 0 rgba(78,243,95,.55)}70%{box-shadow:0 0 0 8px rgba(78,243,95,0)}100%{box-shadow:0 0 0 0 rgba(78,243,95,0)}}

.counter{margin-top:26px;font-family:var(--f-display);letter-spacing:.06em}
.counter .now{font-size:22px;font-weight:700}
.counter .total{font-size:14px;color:var(--dim);font-weight:500}

.grad-text{background:var(--grad);-webkit-background-clip:text;background-clip:text;color:transparent}

/* ---------- pergunta ---------- */
.q-title{
  margin-top:12px;
  font:700 clamp(26px,4.6vw,38px)/1.16 var(--f-display);
  letter-spacing:-.01em;
}
.q-title:focus{outline:none}
.q-sub{margin:16px auto 0;max-width:54ch;font-size:15px;line-height:1.65;color:var(--muted)}

.options{margin-top:30px;display:grid;gap:12px;text-align:left}
.opt{
  position:relative;overflow:hidden;
  display:flex;align-items:center;gap:14px;width:100%;
  padding:18px 20px;border-radius:var(--radius);
  background:var(--surface);border:1px solid var(--line);
  color:var(--text);font:500 16px/1.4 var(--f-body);text-align:left;
  cursor:pointer;
  transition:border-color .2s,background .2s,transform .15s,box-shadow .2s;
}
.opt:hover{border-color:rgba(78,243,95,.45);background:var(--surface-2);transform:translateY(-1px)}
.opt:focus-visible{outline:2px solid var(--g1);outline-offset:3px}
.opt[aria-checked="true"]{
  border-color:var(--g1);
  background:rgba(78,243,95,.07);
  box-shadow:0 0 0 1px rgba(78,243,95,.35),0 10px 30px -16px rgba(78,243,95,.45);
}
.radio{flex:none;width:20px;height:20px;border-radius:50%;border:1.5px solid var(--line-2);display:grid;place-items:center;transition:border-color .2s}
.radio::after{content:"";width:10px;height:10px;border-radius:50%;background:var(--grad);transform:scale(0);transition:transform .18s cubic-bezier(.3,1.4,.5,1)}
.opt[aria-checked="true"] .radio{border-color:var(--g1)}
.opt[aria-checked="true"] .radio::after{transform:scale(1)}

/* assinatura da marca: um feixe de luz atravessa o card escolhido */
.opt::before{
  content:"";position:absolute;inset:0;pointer-events:none;
  background:linear-gradient(100deg,transparent 25%,rgba(160,253,152,.18) 50%,transparent 75%);
  transform:translateX(-130%);
}
.opt.is-picked::before{animation:beam .55s ease forwards}
@keyframes beam{to{transform:translateX(130%)}}

.back{
  margin-top:26px;background:none;border:none;cursor:pointer;
  color:var(--dim);font:500 14px var(--f-body);padding:8px 12px;border-radius:8px;
  transition:color .2s;
}
.back:hover{color:var(--text)}
.back:focus-visible{outline:2px solid var(--g1);outline-offset:2px}
.back.is-hidden{visibility:hidden}

/* ---------- formulário de dados do lead ---------- */
.lead-form{margin-top:30px;display:grid;gap:16px;text-align:left}
.field label{display:block;font:600 11px/1 var(--f-body);letter-spacing:.14em;text-transform:uppercase;color:var(--muted);margin-bottom:9px}
.field input{
  width:100%;padding:17px 19px;border-radius:var(--radius);
  background:var(--surface);border:1px solid var(--line);
  color:var(--text);font:500 16px/1.4 var(--f-body);
  transition:border-color .2s,background .2s,box-shadow .2s;
}
.field input::placeholder{color:var(--dim)}
.field input:hover{border-color:rgba(78,243,95,.45)}
.field input:focus{outline:none;border-color:var(--g1);background:rgba(78,243,95,.05);box-shadow:0 0 0 1px rgba(78,243,95,.35)}
.field .err{display:none;margin-top:8px;font-size:12.5px;color:#ff9d86}
.field.has-error input{border-color:rgba(255,120,90,.75);box-shadow:0 0 0 1px rgba(255,120,90,.35)}
.field.has-error .err{display:block}
.roles{display:grid;gap:10px}
.lead-cta{margin-top:6px;width:100%}

/* ---------- transições entre telas ---------- */
.enter-fwd{animation:inUp .32s cubic-bezier(.2,.7,.3,1) both}
.leave-fwd{animation:outUp .2s ease both}
.enter-back{animation:inDown .32s cubic-bezier(.2,.7,.3,1) both}
.leave-back{animation:outDown .2s ease both}
@keyframes inUp{from{opacity:0;transform:translateY(18px)}to{opacity:1;transform:none}}
@keyframes outUp{to{opacity:0;transform:translateY(-18px)}}
@keyframes inDown{from{opacity:0;transform:translateY(-18px)}to{opacity:1;transform:none}}
@keyframes outDown{to{opacity:0;transform:translateY(18px)}}

/* ---------- tela final ---------- */
.f-title{margin-top:22px;font:700 clamp(28px,5vw,44px)/1.14 var(--f-display);letter-spacing:-.01em}
.f-title:focus{outline:none}
.f-sub{margin:18px auto 0;max-width:62ch;font-size:15.5px;line-height:1.7;color:var(--muted)}

.seals{margin-top:26px;display:flex;flex-wrap:wrap;gap:10px;justify-content:center}
.seal{
  display:inline-flex;align-items:center;gap:8px;
  padding:8px 15px;border-radius:999px;
  border:1px solid var(--line);background:rgba(255,255,255,.02);
  font:500 13px var(--f-body);color:var(--muted);
}
.seal::before{content:"";width:5px;height:5px;border-radius:50%;background:var(--grad)}

.fsteps{margin-top:32px;display:grid;grid-template-columns:repeat(3,1fr);gap:12px;list-style:none;text-align:left}
.fsteps li{background:var(--surface);border:1px solid var(--line);border-radius:var(--radius);padding:18px}
.fsteps .n{display:block;font:700 22px var(--f-display);margin-bottom:8px}
.fsteps p{font-size:13.5px;line-height:1.55;color:var(--muted)}

.cta{
  margin-top:34px;display:inline-block;border:none;cursor:pointer;
  padding:17px 34px;border-radius:999px;width:min(100%,400px);
  background:var(--grad);color:#052310;
  font:600 16px var(--f-display);letter-spacing:.01em;
  box-shadow:0 12px 34px -12px rgba(78,243,95,.55);
  transition:transform .15s,box-shadow .2s,filter .2s;
}
.cta:hover{transform:translateY(-2px);filter:brightness(1.05);box-shadow:0 16px 40px -12px rgba(78,243,95,.65)}
.cta:focus-visible{outline:2px solid var(--g2);outline-offset:3px}

.scarcity{margin-top:14px;font-size:13px;color:var(--dim)}

.cal-panel{
  margin:38px auto 0;width:100%;
  border:1px solid var(--line);border-radius:20px;overflow:hidden;background:#0d100d;
}
.cal-panel iframe{display:block;width:100%;height:700px;border:0}
.cal-placeholder{padding:56px 28px;text-align:center;border:1px dashed var(--line-2);border-radius:20px;margin-top:38px}
.cal-placeholder h3{font:700 17px var(--f-display);margin-bottom:10px}
.cal-placeholder p{font-size:14px;color:var(--muted);line-height:1.7;max-width:52ch;margin:0 auto}
.cal-placeholder code{color:var(--g2);background:rgba(78,243,95,.08);padding:2px 7px;border-radius:6px;font-size:13px}

@media (max-width:640px){
  .fsteps{grid-template-columns:1fr}
  .cal-panel iframe{height:980px}
  .opt{padding:16px}
}

@media (prefers-reduced-motion:reduce){
  *,*::before,*::after{animation:none!important;transition:none!important}
  html{scroll-behavior:auto}
}
</style>
</head>

    subtitle: "Usamos esses dados só pra preparar o Raio-X da sua imobiliária e confirmar a sessão pelo WhatsApp. Nada de spam.",
    cta: "Liberar meu diagnóstico",
    fields: {
      nome:        { label: "Nome",                placeholder: "Seu nome completo" },
      telefone:    { label: "Telefone (WhatsApp)", placeholder: "(11) 98765-4321" },
      imobiliaria: { label: "Nome da imobiliária", placeholder: "Como sua imobiliária se chama" }
    },
    cargoLabel: "Cargo",
    roles: [
      { label: "Dono de imobiliária", tag: "dono" },
      { label: "Gestor comercial",    tag: "gestor-comercial" },
      { label: "Corretor",            tag: "corretor" }
    ],
    errors: {
      nome:        "Digite seu nome.",
      telefone:    "Digite um WhatsApp válido com DDD.",
      imobiliaria: "Digite o nome da imobiliária.",
      cargo:       "Selecione seu cargo."
    }
  },

  final: {
    badge: "Perfil verificado · Vaga liberada para você",
    title: "Sua imobiliária foi selecionada para o",
    titleHighlight: "Diagnóstico Comercial",
    subtitle: "No mercado imobiliário, menos de 2 em cada 100 leads viram venda. Em 30 minutos, um especialista mapeia onde a sua operação está perdendo negócio — do lead que entra ao fechamento — com base no que você acabou de responder.",
    seals: ["Gratuito", "30 min · online", "Personalizado", "Vagas limitadas"],
    steps: [
      "Escolha o melhor horário no calendário abaixo",
      "Confirme seus dados em menos de 1 minuto",
      "Receba o diagnóstico ao vivo com um especialista"
    ],
    cta: "Garantir minha vaga no diagnóstico",
    scarcity: "A reserva é liberada por ordem de preenchimento."
  }
};

/* ============================================================
   MOTOR DO QUIZ
   ============================================================ */
(function(){
  const cfg          = QUIZ_CONFIG;
  const total        = cfg.steps.length;
  const totalScreens = total + 1; /* perguntas + tela de dados */
  const screenEl = document.getElementById("screen");
  const fillEl   = document.getElementById("progressFill");
  const state    = { index: 0, answers: {}, lead: {} };
  let   busy     = false;

  const pad   = n => String(n).padStart(2, "0");
  const esc   = s => String(s == null ? "" : s).replace(/[&<>"']/g, function(c){
    return { "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;" }[c];
  });
  const track = (event, data) => {
    window.dataLayer = window.dataLayer || [];
    window.dataLayer.push(Object.assign({ event: event }, data || {}));
  };

  function setProgress(pct){ fillEl.style.width = pct + "%"; }

  function answersQuery(sep){
    return cfg.steps
      .map(s => s.id + (sep === "url" ? "=" : ":") + (state.answers[s.id] || ""))
      .join(sep === "url" ? "&" : "|");
  }

  function leadQuery(sep){
    return ["nome", "telefone", "imobiliaria", "cargo"]
      .map(k => sep === "url"
        ? k + "=" + encodeURIComponent(state.lead[k] || "")
        : k + ":" + (state.lead[k] || ""))
      .join(sep === "url" ? "&" : "|");
  }

  /* ---------- telas ---------- */
  function questionHTML(i){
    const step    = cfg.steps[i];
    const options = step.options.map(o => (
      '<button type="button" class="opt" role="radio" aria-checked="' +
      (state.answers[step.id] === o.tag) + '" data-tag="' + o.tag + '">' +
        '<span class="radio" aria-hidden="true"></span>' +
        '<span>' + o.label + '</span>' +
      '</button>'
    )).join("");

    return (
      '<span class="pill"><span class="dot"></span>' + cfg.badge + '</span>' +
      '<div class="counter" aria-label="Etapa ' + (i + 1) + ' de ' + totalScreens + '">' +
        '<span class="now grad-text">' + pad(i + 1) + '</span>' +
        '<span class="total"> / ' + pad(totalScreens) + '</span>' +
      '</div>' +
      '<h1 class="q-title" id="qTitle" tabindex="-1">' + step.title + '</h1>' +
      (step.subtitle ? '<p class="q-sub">' + step.subtitle + '</p>' : '') +
      '<div class="options" role="radiogroup" aria-labelledby="qTitle">' + options + '</div>' +
      '<button type="button" class="back' + (i === 0 ? ' is-hidden' : '') + '">&larr; Voltar</button>'
    );
  }

  function leadHTML(){
    const l = cfg.lead;
    const textField = function(key, type, autocomplete, inputmode){
      const f = l.fields[key];
      return (
        '<div class="field" data-field="' + key + '">' +
          '<label for="lead-' + key + '">' + f.label + '</label>' +
          '<input id="lead-' + key + '" name="' + key + '" type="' + type + '"' +
            ' placeholder="' + esc(f.placeholder) + '" value="' + esc(state.lead[key]) + '"' +
            ' autocomplete="' + autocomplete + '"' + (inputmode ? ' inputmode="' + inputmode + '"' : '') + ' />' +
          '<span class="err">' + l.errors[key] + '</span>' +
        '</div>'
      );
    };

    const roles = l.roles.map(o => (
      '<button type="button" class="opt" role="radio" aria-checked="' +
      (state.lead.cargo === o.tag) + '" data-tag="' + o.tag + '">' +
        '<span class="radio" aria-hidden="true"></span>' +
        '<span>' + o.label + '</span>' +
      '</button>'
    )).join("");

    return (
      '<span class="pill"><span class="dot"></span>' + cfg.badge + '</span>' +
      '<div class="counter" aria-label="Etapa ' + totalScreens + ' de ' + totalScreens + '">' +
        '<span class="now grad-text">' + pad(totalScreens) + '</span>' +
        '<span class="total"> / ' + pad(totalScreens) + '</span>' +
      '</div>' +
      '<h1 class="q-title" id="qTitle" tabindex="-1">' + l.title + '</h1>' +
      '<p class="q-sub">' + l.subtitle + '</p>' +
      '<form class="lead-form" id="leadForm" novalidate>' +
        textField("nome", "text", "name") +
        textField("telefone", "tel", "tel", "tel") +
        textField("imobiliaria", "text", "organization") +
        '<div class="field" data-field="cargo">' +
          '<label id="cargoLabel">' + l.cargoLabel + '</label>' +
          '<div class="roles" role="radiogroup" aria-labelledby="cargoLabel">' + roles + '</div>' +
          '<span class="err">' + l.errors.cargo + '</span>' +
        '</div>' +
        '<button type="submit" class="cta lead-cta">' + l.cta + '</button>' +
      '</form>' +
      '<button type="button" class="back">&larr; Voltar</button>'
    );
  }

  function finalHTML(){
    const f     = cfg.final;
    const seals = f.seals.map(s => '<span class="seal">' + s + '</span>').join("");
    const steps = f.steps.map((s, i) =>
      '<li><span class="n grad-text">' + pad(i + 1) + '</span><p>' + s + '</p></li>'
    ).join("");

    const isPlaceholder = cfg.scheduling.calendlyUrl.indexOf("SEU-USUARIO") !== -1;
    const calendar = isPlaceholder
      ? '<div class="cal-placeholder"><h3>Calendário de agendamento</h3>' +
        '<p>Cole o link do seu Calendly em <code>QUIZ_CONFIG.scheduling.calendlyUrl</code> ' +
        'no topo do código. O calendário aparece aqui automaticamente, já com as cores da Beam Broker ' +
        'e as respostas do lead anexadas para segmentação.</p></div>'
      : '<div class="cal-panel"><iframe src="' + calendlyURL() + '" title="Agendar diagnóstico" loading="lazy"></iframe></div>';

    return (
      '<span class="pill"><span class="dot"></span>' + f.badge + '</span>' +
      '<h1 class="f-title" id="qTitle" tabindex="-1">' + f.title + ' <span class="grad-text">' + f.titleHighlight + '</span></h1>' +
      '<p class="f-sub">' + f.subtitle + '</p>' +
      '<div class="seals">' + seals + '</div>' +
      '<ol class="fsteps">' + steps + '</ol>' +
      '<button type="button" class="cta" id="ctaBtn">' + f.cta + '</button>' +
      '<p class="scarcity">' + f.scarcity + '</p>' +
      calendar
    );
  }

  function calendlyURL(){
    try {
      const u = new URL(cfg.scheduling.calendlyUrl);
      u.searchParams.set("hide_gdpr_banner", "1");
      u.searchParams.set("background_color", "0a0a0a");
      u.searchParams.set("text_color", "f2f5f1");
      u.searchParams.set("primary_color", "4ef35f");
      u.searchParams.set("embed_type", "Inline");
      u.searchParams.set("embed_domain", location.hostname || "localhost");
      u.searchParams.set("utm_source", "quiz_selecao");
      u.searchParams.set("utm_medium", "site");
      u.searchParams.set("utm_content", answersQuery("pipe") + "|" + leadQuery("pipe"));
      if (state.lead.nome) u.searchParams.set("name", state.lead.nome);
      return u.toString();
    } catch (e) { return cfg.scheduling.calendlyUrl; }
  }

  /* ---------- transição + eventos ---------- */
  function swap(renderFn, direction){
    screenEl.classList.remove("enter-fwd", "enter-back");
    screenEl.classList.add(direction === "back" ? "leave-back" : "leave-fwd");
    setTimeout(function(){
      screenEl.classList.remove("leave-fwd", "leave-back");
      renderFn();
      screenEl.classList.add(direction === "back" ? "enter-back" : "enter-fwd");
      const title = document.getElementById("qTitle");
      if (title) title.focus({ preventScroll: true });
      window.scrollTo({ top: 0 });
      busy = false;
    }, 210);
  }

  function renderQuestion(){
    screenEl.className = "screen";
    screenEl.innerHTML = questionHTML(state.index);
    setProgress((state.index / totalScreens) * 100);
    bindQuestion();
  }

  function renderLead(){
    screenEl.className = "screen";
    screenEl.innerHTML = leadHTML();
    setProgress((total / totalScreens) * 100);
    bindLead();
  }

  function bindLead(){
    const form  = document.getElementById("leadForm");
    const tel   = document.getElementById("lead-telefone");
    const roles = Array.prototype.slice.call(form.querySelectorAll(".opt"));
    const back  = screenEl.querySelector(".back");

    const clearError = function(key){
      const field = form.querySelector('[data-field="' + key + '"]');
      if (field) field.classList.remove("has-error");
    };

    /* máscara de telefone BR: (11) 98765-4321 */
    tel.addEventListener("input", function(){
      const d = this.value.replace(/\D/g, "").slice(0, 11);
      let v = d;
      if (d.length > 2) v = "(" + d.slice(0, 2) + ") " + d.slice(2);
      if (d.length > 6) {
        const cut = d.length > 10 ? 7 : 6;
        v = "(" + d.slice(0, 2) + ") " + d.slice(2, cut) + "-" + d.slice(cut);
      }
      this.value = v;
    });

    ["nome", "telefone", "imobiliaria"].forEach(function(key){
      document.getElementById("lead-" + key).addEventListener("input", function(){ clearError(key); });
    });

    roles.forEach(function(btn){
      btn.addEventListener("click", function(){
        roles.forEach(function(b){ b.setAttribute("aria-checked", "false"); });
        btn.setAttribute("aria-checked", "true");
        btn.classList.add("is-picked");
        state.lead.cargo = btn.dataset.tag;
        clearError("cargo");
      });
    });

    back.addEventListener("click", function(){
      if (busy) return;
      busy = true;
      state.index = total - 1;
      swap(renderQuestion, "back");
    });

    form.addEventListener("submit", function(e){
      e.preventDefault();
      state.lead.nome        = document.getElementById("lead-nome").value.trim();
      state.lead.telefone    = tel.value.trim();
      state.lead.imobiliaria = document.getElementById("lead-imobiliaria").value.trim();

      const digits = state.lead.telefone.replace(/\D/g, "");
      const errors = {
        nome:        state.lead.nome.length < 2,
        telefone:    digits.length < 10,
        imobiliaria: state.lead.imobiliaria.length < 2,
        cargo:       !state.lead.cargo
      };

      let firstError = null;
      Object.keys(errors).forEach(function(key){
        const field = form.querySelector('[data-field="' + key + '"]');
        field.classList.toggle("has-error", errors[key]);
        if (errors[key] && !firstError) firstError = field;
      });
      if (firstError) {
        const input = firstError.querySelector("input");
        if (input) input.focus();
        return;
      }

      track("quiz_lead", Object.assign({}, state.lead));
      sendLeadToCRM();
      const redirect = cfg.scheduling.redirectUrl;
      if (redirect) {
        const sep = redirect.indexOf("?") === -1 ? "?" : "&";
        location.href = redirect + sep + answersQuery("url") + "&" + leadQuery("url");
        return;
      }
      busy = true;
      swap(renderFinal, "fwd");
    });
  }

  function renderFinal(){
    screenEl.className = "screen screen--final";
    screenEl.innerHTML = finalHTML();
    setProgress(100);
    if (window.fbq) fbq("track", "Schedule", { content_name: "Quiz Raio-X" });
    const cta = document.getElementById("ctaBtn");
    if (cta) cta.addEventListener("click", function(){
      const target = document.querySelector(".cal-panel, .cal-placeholder");
      if (target) window.scrollTo({ top: target.getBoundingClientRect().top + window.pageYOffset - 20, behavior: "smooth" });
    });
  }

  function bindQuestion(){
    const step = cfg.steps[state.index];
    const opts = Array.prototype.slice.call(screenEl.querySelectorAll(".opt"));
    const back = screenEl.querySelector(".back");

    opts.forEach(function(btn){
      btn.addEventListener("click", function(){
        if (busy) return;
        busy = true;
        opts.forEach(function(b){ b.setAttribute("aria-checked", "false"); });
        btn.setAttribute("aria-checked", "true");
        btn.classList.add("is-picked");
        state.answers[step.id] = btn.dataset.tag;
        track("quiz_answer", { step_id: step.id, step_index: state.index + 1, answer: btn.dataset.tag });
        if (state.index === 0 && !state.icSent) {
          state.icSent = true;
          if (window.fbq) fbq("track", "InitiateCheckout", { content_name: "Quiz Raio-X" });
        }

        setTimeout(function(){
          if (state.index < total - 1) {
            state.index++;
            swap(renderQuestion, "fwd");
          } else {
            complete();
          }
        }, 430);
      });
    });

    /* navegação por setas dentro do grupo de opções */
    screenEl.querySelector(".options").addEventListener("keydown", function(e){
      const i = opts.indexOf(document.activeElement);
      if (i === -1) return;
      let next = null;
      if (e.key === "ArrowDown" || e.key === "ArrowRight") next = opts[(i + 1) % opts.length];
      if (e.key === "ArrowUp"   || e.key === "ArrowLeft")  next = opts[(i - 1 + opts.length) % opts.length];
      if (e.key === "Home") next = opts[0];
      if (e.key === "End")  next = opts[opts.length - 1];
      if (next) { e.preventDefault(); next.focus(); }
    });

    back.addEventListener("click", function(){
      if (busy || state.index === 0) return;
      busy = true;
      state.index--;
      swap(renderQuestion, "back");
    });
  }

  /* ---------- rastreamento de campanha (Meta Ads) ---------- */
  const TRACK_KEYS = ["utm_source","utm_medium","utm_campaign","utm_term","utm_content","campaign_id","adset_id","ad_id","fbclid"];

  function captureTracking(){
    const q = new URLSearchParams(location.search);
    let saved = {};
    try { saved = JSON.parse(localStorage.getItem("beam_tracking") || "{}"); } catch (e) {}
    const fresh = {};
    let fromUrl = false;
    TRACK_KEYS.forEach(function(k){
      const v = q.get(k);
      if (v) { fresh[k] = v; fromUrl = true; }
    });
    const merged = fromUrl ? Object.assign({}, saved, fresh) : saved;
    if (fromUrl) { try { localStorage.setItem("beam_tracking", JSON.stringify(merged)); } catch (e) {} }
    return merged;
  }

  const tracking = captureTracking();

  function cookie(name){
    const m = document.cookie.match(new RegExp("(?:^|; )" + name + "=([^;]*)"));
    return m ? decodeURIComponent(m[1]) : "";
  }

  function fbcValue(){
    const c = cookie("_fbc");
    if (c) return c;
    const fbclid = new URLSearchParams(location.search).get("fbclid");
    return fbclid ? "fb.1." + Date.now() + "." + fbclid : "";
  }

  function sendLeadToCRM(){
    try {
      const eventId = "lead-" + Date.now() + "-" + Math.random().toString(36).slice(2, 10);
      if (window.fbq) {
        fbq("track", "Lead", { content_name: "Quiz Raio-X" }, { eventID: eventId });
      }
      const payload = JSON.stringify({
        nome:        state.lead.nome,
        telefone:    state.lead.telefone,
        imobiliaria: state.lead.imobiliaria,
        cargo:       state.lead.cargo,
        respostas:   Object.assign({}, state.answers),
        tracking:    tracking,
        eventId:     eventId,
        fbp:         cookie("_fbp"),
        fbc:         fbcValue(),
        sourceUrl:   location.href
      });
      /* keepalive garante o envio mesmo se a pessoa fechar a aba em seguida */
      fetch("/api/lead", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: payload,
        keepalive: true
      }).catch(function(){ /* não bloqueia a experiência do lead */ });
    } catch (e) { /* silencioso: o fluxo do quiz segue normal */ }
  }

  function complete(){
    track("quiz_complete", { answers: Object.assign({}, state.answers) });
    swap(renderLead, "fwd");
  }

  /* ---------- start ---------- */
  track("quiz_start", { total_steps: total });
  renderQuestion();
  screenEl.classList.add("enter-fwd");
})();
</script>
</body>
</html>
